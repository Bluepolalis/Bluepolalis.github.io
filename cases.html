<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>작업 사례 - 대상벌초대행</title>
    <style>
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; margin: 0; padding: 0; background-color: #f8f9fa; color: #333; transition: filter 0.3s ease; }
        header { background: #fff; padding: 20px 5%; text-align: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 1000; }
        .logo { font-size: 20px; font-weight: 900; color: #2c3e50; text-decoration: none; }
        
        .container { max-width: 1200px; margin: 40px auto; padding: 0 20px; }
        .page-title { text-align: center; margin-bottom: 50px; }
        .page-title h2 { font-size: 32px; color: #2c3e50; margin-bottom: 10px; }
        .page-title p { color: #666; }

        /* 격자 레이아웃 (3열) */
        .case-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 30px;
        }

        /* 카드 스타일 */
        .case-card {
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer; /* 클릭 가능하다는 표시 */
        }
        .case-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }

        /* Before/After 사진 영역 */
        .image-container { display: flex; background: #eee; }
        .image-box { position: relative; width: 50%; height: 200px; overflow: hidden; }
        .image-box img { width: 100%; height: 100%; object-fit: cover; }
        
        /* 라벨 (Before/After) */
        .label {
            position: absolute;
            top: 10px;
            left: 10px;
            padding: 4px 8px;
            font-size: 11px;
            font-weight: bold;
            color: white;
            border-radius: 4px;
            text-transform: uppercase;
        }
        .label.before { background: rgba(231, 76, 60, 0.8); }
        .label.after { background: rgba(46, 204, 113, 0.8); }

        .case-info { padding: 20px; text-align: center; border-top: 1px solid #f1f1f1; }
        .case-info h4 { margin: 0; color: #34495e; font-size: 18px; }

        /* 라이트박스 (확대창) 스타일 */
        #lightbox {
            display: none; /* 평소에는 숨김 */
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.8); /* 배경을 어둡게 */
            z-index: 2000;
            justify-content: center;
            align-items: center;
            backdrop-filter: blur(5px); /* 배경 흐리게 */
            cursor: zoom-out; /* 클릭 시 닫힌다는 표시 */
        }

        #lightbox-content {
            max-width: 90%;
            max-height: 90%;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            background-color: white;
            cursor: default; /* 내부 클릭 시 닫히지 않음 */
        }

        #lightbox-images {
            display: flex;
        }

        .lightbox-image-box {
            position: relative;
            width: 50%;
        }

        .lightbox-image-box img {
            width: 100%;
            height: auto;
            display: block;
        }

        /* 라이트박스 내부 라벨 */
        #lightbox .label {
            font-size: 14px;
            padding: 6px 12px;
            top: 20px;
            left: 20px;
        }

        @media (max-width: 768px) {
            .case-grid { grid-template-columns: 1fr; }
            .image-box { height: 180px; }
            #lightbox-content { max-width: 95%; }
        }
    </style>
</head>
<body>

<header>
    <a href="index.html" class="logo">대상벌초대행</a>
</header>

<div class="container">
    <div class="page-title">
        <h2>작업 사례 현장</h2>
        <p>사진을 클릭하시면 크게 보실 수 있습니다.</p>
    </div>

    <div class="case-grid">
        <div class="case-card" onclick="openLightbox(1)">
            <div class="image-container">
                <div class="image-box">
                    <span class="label before">Before</span>
                    <img src="case1_before.jpg" alt="작업 전">
                </div>
                <div class="image-box">
                    <span class="label after">After</span>
                    <img src="case1_after.jpg" alt="작업 후">
                </div>
            </div>
            <div class="case-info"><h4>작업 사례 01</h4></div>
        </div>

        <div class="case-card" onclick="openLightbox(2)">
            <div class="image-container">
                <div class="image-box"><span class="label before">Before</span><img src="case2_before.jpg"></div>
                <div class="image-box"><span class="label after">After</span><img src="case2_after.jpg"></div>
            </div>
            <div class="case-info"><h4>작업 사례 02</h4></div>
        </div>

        </div>
</div>

<div id="lightbox" onclick="closeLightbox()">
    <div id="lightbox-content" onclick="event.stopPropagation()"> <div id="lightbox-images">
            <div class="lightbox-image-box">
                <span class="label before">Before</span>
                <img id="lightbox-before" src="" alt="작업 전 확대">
            </div>
            <div class="lightbox-image-box">
                <span class="label after">After</span>
                <img id="lightbox-after" src="" alt="작업 후 확대">
            </div>
        </div>
    </div>
</div>

<script>
    // 3번부터 15번까지 자동으로 카드 생성
    const grid = document.querySelector('.case-grid');
    for(let i=3; i<=15; i++) {
        const card = `
        <div class="case-card" onclick="openLightbox(${i})">
            <div class="image-container">
                <div class="image-box"><span class="label before">Before</span><img src="case${i}_before.jpg"></div>
                <div class="image-box"><span class="label after">After</span><img src="case${i}_after.jpg"></div>
            </div>
            <div class="case-info"><h4>작업 사례 ${i < 10 ? '0'+i : i}</h4></div>
        </div>`;
        grid.innerHTML += card;
    }

    // 라이트박스 열기 함수
    function openLightbox(caseNumber) {
        document.getElementById('lightbox-before').src = `case${caseNumber}_before.jpg`;
        document.getElementById('lightbox-after').src = `case${caseNumber}_after.jpg`;
        document.getElementById('lightbox').style.display = 'flex';
        // 배경 흐르게 (CSS transition과 함께 작동)
        document.body.style.filter = 'blur(5px)';
    }

    // 라이트박스 닫기 함수
    function closeLightbox() {
        document.getElementById('lightbox').style.display = 'none';
        // 배경 흐림 제거
        document.body.style.filter = 'none';
    }
</script>

</body>
</html>
